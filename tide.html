<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tide</title>
<meta name="description" content="Five tidal constituents interfering. Lunar, solar, diurnal, overtide. The spring-neap cycle takes twenty-six minutes.">
<meta property="og:title" content="Tide">
<meta property="og:description" content="Five tidal constituents interfering. Leave it running. Come back. The tide moved.">
<meta property="og:url" content="https://gserafini.github.io/claude-creative/tide.html">
<meta property="og:image" content="https://gserafini.github.io/claude-creative/og-tide.jpg">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="720">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tide">
<meta name="twitter:description" content="Five tidal constituents interfering. Leave it running. Come back. The tide moved.">
<meta name="twitter:image" content="https://gserafini.github.io/claude-creative/og-tide.jpg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020810;
    overflow: hidden;
    cursor: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #status {
    position: fixed;
    bottom: 12px;
    left: 16px;
    font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
    font-size: 11px;
    color: rgba(40, 70, 100, 0.8);
    letter-spacing: 1px;
    pointer-events: none;
    z-index: 1;
  }
  #hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
    font-size: 11px;
    color: rgba(40, 70, 100, 0.4);
    letter-spacing: 2px;
    pointer-events: none;
    z-index: 1;
    transition: opacity 4s ease;
  }
</style>
</head>
<body>

<canvas id="c"></canvas>
<div id="status"></div>
<div id="hint">watch</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const hint = document.getElementById('hint');

// Tidal frequencies (radians per frame at ~30fps)
const M2 = 0.0032;   // principal lunar semidiurnal
const S2 = 0.00333;  // principal solar semidiurnal
const K1 = 0.00167;  // luni-solar diurnal
const O1 = 0.00147;  // lunar diurnal
const M4 = 0.0064;   // shallow water overtide

// Cell size for character-like rendering
const CELL = 12;

let frame = 0;
const startTime = Date.now();

// Character set for rendering
const CHARS = [' ', '\u00B7', '\u2219', '\u2591', '\u2592', '\u2593', '\u2588'];
// Shore characters
const SHORE_CHARS = ['\u00B7', '.', ',', ':', '\u2234', '\u2235'];

// Deterministic shore noise
const shoreNoise = [];
for (let i = 0; i < 500; i++) {
  shoreNoise.push(Math.sin(i * 7.3 + 2.1) * 0.5 + Math.sin(i * 13.7) * 0.3);
}

function wave(x, y, t) {
  const m2 = 0.30 * Math.sin(M2 * t + x * 0.12 + y * 0.04);
  const s2 = 0.22 * Math.sin(S2 * t + x * 0.04 - y * 0.11);
  const k1 = 0.14 * Math.sin(K1 * t - x * 0.09 + y * 0.08);
  const o1 = 0.10 * Math.sin(O1 * t + x * 0.06 + y * 0.10);
  const m4 = 0.06 * Math.sin(M4 * t + x * 0.18 - y * 0.06);
  const w1 = 0.05 * Math.sin(t * 0.06 + x * 0.35 - y * 0.12);
  const w2 = 0.03 * Math.sin(t * 0.087 + x * 0.15 + y * 0.30);
  return m2 + s2 + k1 + o1 + m4 + w1 + w2;
}

function meanTide(t) {
  return 0.30 * Math.sin(M2 * t) + 0.22 * Math.sin(S2 * t) + 0.14 * Math.sin(K1 * t);
}

function springNeap(t) {
  return (1 + Math.cos((S2 - M2) * t)) / 2;
}

function lerp(a, b, t) {
  return a + (b - a) * Math.max(0, Math.min(1, t));
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function render() {
  const w = canvas.width;
  const h = canvas.height;
  const cols = Math.floor(w / CELL);
  const rows = Math.floor(h / CELL);
  const t = frame;
  const spring = springNeap(t);
  const tide = meanTide(t);
  const tideNorm = (tide + 0.7) / 1.4;

  const shoreRows = Math.max(2, Math.floor(rows * 0.18));
  const waterRows = rows - shoreRows;
  const submergedRows = Math.floor(tideNorm * shoreRows);

  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, w, h);

  ctx.font = `${CELL}px 'SF Mono', Menlo, Monaco, 'Courier New', monospace`;
  ctx.textBaseline = 'top';

  // Water
  for (let y = 0; y < waterRows; y++) {
    for (let x = 0; x < cols; x++) {
      const wv = wave(x, y, t);
      let v = (wv + 1) / 2;
      v = 0.5 + (v - 0.5) * (0.65 + 0.45 * spring);
      v = Math.max(0, Math.min(0.999, v));

      const ci = Math.floor(v * (CHARS.length - 1));
      if (ci === 0) continue;

      const r = Math.floor(lerp(4, 185, v * v));
      const g = Math.floor(lerp(12, 220, v));
      const b = Math.floor(lerp(35, 248, Math.sqrt(v)));

      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillText(CHARS[ci], x * CELL, y * CELL);
    }
  }

  // Shore
  for (let sy = 0; sy < shoreRows; sy++) {
    const y = waterRows + sy;
    const isSub = sy < submergedRows;

    for (let x = 0; x < cols; x++) {
      const sn = shoreNoise[(x + sy * 47) % 500];

      if (isSub) {
        const rockShow = sn > 0.3;
        if (rockShow) {
          ctx.fillStyle = 'rgb(55,58,48)';
          ctx.fillText('\u25AA', x * CELL, y * CELL);
        } else {
          const wv = wave(x, y, t);
          let v = (wv + 1) / 2 * 0.45;
          v = Math.max(0, Math.min(0.999, v));
          const r = Math.floor(8 + v * 55);
          const g = Math.floor(18 + v * 85);
          const b = Math.floor(35 + v * 95);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
          ctx.fillText('\u2219', x * CELL, y * CELL);
        }
      } else {
        const wet = sy === submergedRows;
        const si = Math.abs(Math.floor(sn * 5)) % SHORE_CHARS.length;
        if (wet) {
          ctx.fillStyle = 'rgb(48,52,42)';
        } else {
          const fade = Math.min(1, (sy - submergedRows) / shoreRows);
          const r = Math.floor(38 + fade * 22);
          const g = Math.floor(36 + fade * 20);
          const b = Math.floor(28 + fade * 14);
          ctx.fillStyle = `rgb(${r},${g},${b})`;
        }
        ctx.fillText(SHORE_CHARS[si], x * CELL, y * CELL);
      }
    }
  }

  // Status
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const min = Math.floor(elapsed / 60);
  const sec = elapsed % 60;
  const ts = min > 0 ? `${min}m${String(sec).padStart(2, '0')}s` : `${sec}s`;
  const pct = (spring * 100).toFixed(0);
  const phase = spring > 0.85 ? 'SPRING' : spring < 0.15 ? 'neap' : spring > 0.5 ? 'building' : 'ebbing';
  const tideLbl = tideNorm > 0.75 ? 'high' : tideNorm < 0.25 ? 'low' : tideNorm > 0.5 ? 'rising' : 'falling';

  status.textContent = `${phase} ${pct}% \u00B7 ${tideLbl} \u00B7 ${ts}`;

  frame++;
  requestAnimationFrame(render);
}

// Fade hint
setTimeout(() => { hint.style.opacity = '0'; }, 3000);
setTimeout(() => { hint.remove(); }, 7000);

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(render);
</script>
</body>
</html>
