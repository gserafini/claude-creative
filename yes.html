<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0c;
            color: #c8a860;
            font-family: 'Courier New', monospace;
            font-size: 17px;
            line-height: 1.65;
            padding: 48px 40px;
            min-height: 100vh;
            cursor: text;
            -webkit-user-select: none;
            user-select: none;
        }
        #field {
            white-space: pre-wrap;
            word-wrap: break-word;
            max-width: 68ch;
        }
        .cursor {
            display: inline;
            opacity: 1;
        }
        .cursor.blink {
            animation: blink 1s step-end infinite;
        }
        .cursor.dying {
            animation: die 3s ease-out forwards;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        @keyframes die {
            0% { opacity: 1; }
            60% { opacity: 1; }
            80% { opacity: 0; }
            90% { opacity: 0.6; }
            100% { opacity: 0; }
        }
        #hint {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: #222;
            font-size: 12px;
            letter-spacing: 0.25em;
            opacity: 0;
            transition: opacity 2.5s ease;
            pointer-events: none;
        }
        #hint.show { opacity: 1; }
        #hint.hide { opacity: 0; transition: opacity 0.8s ease; }
    </style>
</head>
<body>
    <div id="field"><span class="cursor blink" id="cur">&#9612;</span></div>
    <div id="hint">type</div>

    <script>
    const field = document.getElementById('field');
    const cur = document.getElementById('cur');
    const hint = document.getElementById('hint');

    // State
    let display = '';
    let typed = '';
    let charCount = 0;
    let words = [];
    let bigrams = new Map();
    let lastKeyTime = 0;
    let keySpeeds = [];
    let autonomous = false;
    let dead = false;
    let started = false;

    // Phase thresholds — different every run
    const T = [
        0,
        80 + Math.floor(Math.random() * 50),     // ~15-20 words of trust
        200 + Math.floor(Math.random() * 80),     // ambiguous zone
        400 + Math.floor(Math.random() * 120),    // undeniable drift
        650 + Math.floor(Math.random() * 150),    // takeover
    ];

    // QWERTY adjacency
    const adj = {
        a:'sqwz',b:'vghn',c:'xdfv',d:'srfce',e:'wrsd',f:'drtgcv',
        g:'ftyhbv',h:'gyujbn',i:'ujko',j:'huiknm',k:'jiolm',l:'kop',
        m:'njk',n:'bhjm',o:'iklp',p:'ol',q:'wa',r:'edft',s:'awedxz',
        t:'rfgy',u:'yhji',v:'cfgb',w:'qase',x:'zsdc',y:'tghu',z:'asx'
    };

    // Show hint after 4s
    const hintTimer = setTimeout(() => hint.classList.add('show'), 4000);

    // --- Helpers ---

    function phase() {
        if (charCount < T[1]) return 1;
        if (charCount < T[2]) return 2;
        if (charCount < T[3]) return 3;
        if (charCount < T[4]) return 4;
        return 5;
    }

    function progress() {
        const p = phase();
        const s = T[p - 1] || 0;
        const e = T[p] || (T[4] + 300);
        return Math.min(1, Math.max(0, (charCount - s) / (e - s)));
    }

    function nearKey(ch) {
        const lo = ch.toLowerCase();
        const a = adj[lo];
        if (!a) return ch;
        const r = a[Math.floor(Math.random() * a.length)];
        return ch === ch.toUpperCase() ? r.toUpperCase() : r;
    }

    function updateLang() {
        const w = typed.match(/[a-zA-Z']+/g) || [];
        words = w;
        bigrams.clear();
        for (let i = 0; i < w.length - 1; i++) {
            const k = w[i].toLowerCase();
            if (!bigrams.has(k)) bigrams.set(k, []);
            bigrams.get(k).push(w[i + 1]);
        }
    }

    function pick() {
        return words.length ? words[Math.floor(Math.random() * words.length)] : '';
    }

    function next(from) {
        // 20% random to prevent loops
        if (Math.random() < 0.2 || !from) return pick();
        const k = from.toLowerCase();
        const opts = bigrams.get(k);
        if (opts && opts.length) return opts[Math.floor(Math.random() * opts.length)];
        return pick();
    }

    function render() {
        field.textContent = display;
        field.appendChild(cur);
    }

    // --- Character processing ---

    function processChar(ch) {
        const p = phase();
        const pr = progress();

        if (p === 1) return ch;

        if (p === 2) {
            // Subtle adjacent-key drift — could be you mistyping
            if (ch.match(/[a-zA-Z]/) && Math.random() < 0.03 + pr * 0.07)
                return nearKey(ch);
            return ch;
        }

        if (p === 3) {
            // Word insertions on space — your vocabulary, not your sentence
            if (ch === ' ' && words.length > 5 && Math.random() < pr * 0.18)
                return ' ' + pick() + ' ';
            // Letter drift accelerates
            if (ch.match(/[a-zA-Z]/) && Math.random() < 0.04 + pr * 0.12)
                return nearKey(ch);
            return ch;
        }

        if (p === 4) {
            // Keys go missing
            if (Math.random() < pr * 0.3) return '';
            // Your words, its order
            if (ch === ' ' && words.length > 5 && Math.random() < 0.25 + pr * 0.4)
                return ' ' + pick();
            // Heavy drift
            if (ch.match(/[a-zA-Z]/) && Math.random() < 0.15 + pr * 0.35)
                return nearKey(ch);
            return ch;
        }

        return ''; // Phase 5: silence
    }

    function canBackspace() {
        const p = phase();
        if (p <= 2) return true;
        if (p === 3) return Math.random() < 0.6;
        if (p === 4) return Math.random() < 0.15;
        return false;
    }

    // --- Autonomous voice ---

    function beginAutonomous() {
        if (autonomous || dead) return;
        autonomous = true;

        if (words.length < 3) {
            // Not enough material. Brief gesture, then death.
            setTimeout(() => {
                dead = true;
                cur.classList.remove('blink');
                cur.classList.add('dying');
            }, 4000);
            return;
        }

        const avgSpeed = keySpeeds.length > 5
            ? keySpeeds.reduce((a, b) => a + b) / keySpeeds.length
            : 110;

        let current = pick();
        let queue = [];
        let wordsDone = 0;
        const maxWords = Math.min(words.length * 3, 80);

        function enqueueWord() {
            if (dead || wordsDone >= maxWords) return false;

            // Self-editing: type a word, pause, delete it, type another
            if (wordsDone > 2 && Math.random() < 0.1) {
                const wrong = pick();
                for (const c of wrong)
                    queue.push({ c, t: avgSpeed * (0.5 + Math.random() * 0.7) });
                queue.push({ c: null, t: avgSpeed * 4 }); // pause
                for (let i = 0; i < wrong.length; i++)
                    queue.push({ c: '\b', t: avgSpeed * 0.35 });
                queue.push({ c: null, t: avgSpeed * 1.5 });
            }

            const w = next(current);
            current = w;
            wordsDone++;

            for (const c of w)
                queue.push({ c, t: avgSpeed * (0.4 + Math.random() * 1.1) });

            // Space or newline
            if (Math.random() < 0.07)
                queue.push({ c: '\n', t: avgSpeed * 3 });
            else
                queue.push({ c: ' ', t: avgSpeed * (1.2 + Math.random() * 2.5) });

            // Longer pauses as it winds down
            if (wordsDone > maxWords * 0.65)
                queue.push({ c: null, t: avgSpeed * (4 + Math.random() * 10) });

            return true;
        }

        // Seed queue
        queue.push({ c: '\n', t: avgSpeed * 2 });
        for (let i = 0; i < 5; i++) enqueueWord();

        function tick() {
            if (dead) return;

            if (queue.length < 3) {
                if (!enqueueWord()) {
                    // Winding down
                    setTimeout(() => {
                        dead = true;
                        // One last blink, then the cursor dies
                        setTimeout(() => {
                            cur.classList.remove('blink');
                            cur.classList.add('dying');
                        }, 8000);
                    }, 2000);
                    return;
                }
            }

            const item = queue.shift();

            if (item.c === '\b') {
                if (display.length > 0) {
                    display = display.slice(0, -1);
                    render();
                }
            } else if (item.c !== null) {
                display += item.c;
                render();
            }

            const nextT = queue.length > 0 ? queue[0].t : avgSpeed * 2;
            setTimeout(tick, nextT);
        }

        setTimeout(tick, avgSpeed * 3);
    }

    // --- Idle & pause timers ---

    let pauseTimer = null;
    let idleTimer = null;

    function resetTimers() {
        clearTimeout(pauseTimer);
        clearTimeout(idleTimer);
        if (!autonomous) {
            if (phase() >= 4) {
                pauseTimer = setTimeout(beginAutonomous, 2800);
            }
            // Long idle in Phase 3+ also triggers
            if (phase() >= 3) {
                idleTimer = setTimeout(() => {
                    if (phase() >= 4) beginAutonomous();
                }, 7000);
            }
        }
    }

    // --- Input ---

    document.addEventListener('keydown', (e) => {
        if (dead || autonomous) { e.preventDefault(); return; }

        if (!started) {
            started = true;
            hint.classList.remove('show');
            hint.classList.add('hide');
            clearTimeout(hintTimer);
        }

        // Track speed
        const now = Date.now();
        if (lastKeyTime) {
            const dt = now - lastKeyTime;
            if (dt > 20 && dt < 2000) {
                keySpeeds.push(dt);
                if (keySpeeds.length > 80) keySpeeds.shift();
            }
        }
        lastKeyTime = now;
        resetTimers();

        // Backspace
        if (e.key === 'Backspace') {
            e.preventDefault();
            if (canBackspace() && display.length > 0) {
                display = display.slice(0, -1);
                typed = typed.slice(0, -1);
                updateLang();
                render();
            }
            return;
        }

        // Enter
        if (e.key === 'Enter') {
            e.preventDefault();
            charCount++;
            typed += ' ';
            updateLang();
            if (phase() <= 4) {
                display += '\n';
                render();
            }
            if (phase() === 5) beginAutonomous();
            return;
        }

        // Tab — prevent leaving
        if (e.key === 'Tab') { e.preventDefault(); return; }

        // Non-printable
        if (e.key.length !== 1 || e.ctrlKey || e.metaKey || e.altKey) return;
        e.preventDefault();

        charCount++;
        typed += e.key;
        updateLang();

        const out = processChar(e.key);
        if (out) {
            display += out;
            render();
        }

        if (phase() === 5 && !autonomous) beginAutonomous();
    });

    // Mobile
    const mob = document.createElement('input');
    mob.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;pointer-events:none;';
    mob.setAttribute('autocapitalize', 'off');
    mob.setAttribute('autocomplete', 'off');
    mob.setAttribute('autocorrect', 'off');
    mob.setAttribute('spellcheck', 'false');
    document.body.appendChild(mob);

    document.body.addEventListener('touchstart', () => {
        mob.style.pointerEvents = 'auto';
        mob.focus();
        if (!started) {
            started = true;
            hint.classList.remove('show');
            hint.classList.add('hide');
            clearTimeout(hintTimer);
        }
    });

    mob.addEventListener('input', (e) => {
        const data = e.data;
        if (!data || dead || autonomous) { mob.value = ''; return; }

        const now = Date.now();
        if (lastKeyTime) {
            const dt = now - lastKeyTime;
            if (dt > 20 && dt < 2000) keySpeeds.push(dt);
        }
        lastKeyTime = now;
        resetTimers();

        for (const ch of data) {
            charCount++;
            typed += ch;
            updateLang();
            const out = processChar(ch);
            if (out) display += out;
        }
        render();
        mob.value = '';

        if (phase() === 5 && !autonomous) beginAutonomous();
    });

    // Prevent paste
    document.addEventListener('paste', e => e.preventDefault());

    // Click focuses for typing
    document.body.addEventListener('click', () => {
        if (!started) {
            started = true;
            hint.classList.remove('show');
            hint.classList.add('hide');
            clearTimeout(hintTimer);
        }
    });

    </script>
</body>
</html>
